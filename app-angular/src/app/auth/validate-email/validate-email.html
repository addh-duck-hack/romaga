<!-- component -->
<div class="h-screen md:flex">
	<div
		class="relative overflow-hidden md:flex w-1/2 bg-gradient-to-tr to-[#8C2626] from-[#F08713] i justify-around items-center hidden">
		<div>
			<h1 class="text-white font-bold text-4xl font-sans">{{ env.companyName }}</h1>
			<p class="text-white mt-1">Servicios</p>
			<a routerLink="/" class="block w-28 bg-white text-center text-[#8C2626] mt-4 py-2 rounded-2xl font-bold mb-2">Regresar</a>
		</div>
		<div class="absolute -bottom-32 -left-40 w-80 h-80 border-4 rounded-full border-opacity-30 border-t-8"></div>
		<div class="absolute -bottom-40 -left-20 w-80 h-80 border-4 rounded-full border-opacity-30 border-t-8"></div>
		<div class="absolute -top-40 -right-0 w-80 h-80 border-4 rounded-full border-opacity-30 border-t-8"></div>
		<div class="absolute -top-20 -right-20 w-80 h-80 border-4 rounded-full border-opacity-30 border-t-8"></div>
	</div>
	<div class="flex md:w-1/2 justify-center py-10 items-center bg-white">
		<form class="bg-white login-form" style="width: 60%;">
			<h1 class="text-gray-800 font-bold text-2xl mb-1">¡Hola!</h1>
			<p class="text-sm font-normal text-gray-600 mb-7">Presiona el boton de abajo para poder validar tu cuenta</p>

      <button
        type="button"
        (click)="validateEmail()"
        class="block w-full hover:bg-[#C93636] bg-[#8C2626] cursor-pointer mt-4 py-2 rounded-2xl text-white font-semibold mb-2">
        Validar correo
      </button>
		</form>
	</div>
</div>
