<div class="flex items-center space-x-4 ml-6">
  @for (item of socialItems(); track item.id) {
    <a
    [href]="item.url"
    [target]="item.newPage ? '_blank' : '_self'"
    rel="noopener noreferrer"
    class="social-icon transition-colors"
    title="{{ item.name }}">
    <i class="{{ item.icon }} text-xl"></i>
    </a>
  }
</div>
