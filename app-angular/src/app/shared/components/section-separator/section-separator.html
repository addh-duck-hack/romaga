<div class="w-full h-150">
  <div class="slide relative h-full w-full"
    [style.backgroundImage]="'url(\'' + section().image + '\')'">
    <div class="absolute inset-0 flex flex-col items-center justify-center px-6 text-center">
      <div class="description-separator max-w-4xl">
        <h2 class="text-3xl font-bold tracking-tightsm:text-5xl">{{ section().title }}</h2>
        <p class="mt-4 text-sm sm:text-lg">{{ section().description }}</p>
        <a
        [routerLink]="section().route"
        class="button-contact block">
          CONTÁCTANOS
        </a>
      </div>
    </div>
  </div>
</div>
