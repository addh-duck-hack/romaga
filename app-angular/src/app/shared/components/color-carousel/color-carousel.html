<!-- component -->
<div class="relative w-full color-carousel bg-slate-800">
  <div
    class="relative h-[100%] flex transition-all duration-500 ease-in-out"
    [style.width.%]="carouselItems.length * 100"
    [style.transform]="'translateX(-' + currentIndex() * (100 / carouselItems.length) + '%)'"
  >
    @for (item of carouselItems; track item.id; let i = $index) {
      <div
        [style.backgroundImage]="'url(' + item.image + ')'"
        class="img-carousel-color relative w-full h-full flex">
        <div class="content-container block" [class.slide-in]="currentIndex() === i">
          <h2 class="carousel-title mb-4">{{ item.title }}</h2>
          <p class="carousel-description">{{ item.description }}</p>
        </div>
      </div>
    }
  </div>

  <div
    class="absolute w-full flex justify-center gap-2 bottom-12"
  >
    @for (item of carouselItems; track item.id; let i = $index) {
      <button
        class="block w-5 h-5 bg-white cursor-pointer opacity-50 z-10 transition-all duration-300 ease-in-out hover:opacity-100"
        [class.active]="currentIndex() === i"
        (click)="goToSlide(i)"
      ></button>
    }
  </div>
</div>
