<div class="carousel relative h-screen w-full overflow-hidden">
  @for (item of carouselItems; track item.id; let i = $index) {
    <div class="slide absolute inset-0 transition-opacity duration-700 ease-in-out"
    [class.opacity-100]="currentSlide === i"
    [class.opacity-0]="currentSlide !== i"
    [style.backgroundImage]="'url(\'' + item.image + '\')'">
      <div class="absolute inset-0 bg-black/45"></div>
      <div class="absolute inset-0 flex flex-col items-center justify-center px-6 text-center text-white">
        <div class="max-w-4xl">
          <h2 class="text-3xl font-bold tracking-tight text-white sm:text-5xl">{{ item.title }}</h2>
          <p class="mt-4 text-sm text-gray-200 sm:text-lg">{{ item.description }}</p>
          <a
          [routerLink]="item.route"
          class="mt-8 inline-flex rounded-full bg-white/10 px-6 py-3 text-sm font-semibold text-white ring-1 ring-white/20 transition hover:bg-white/20">
            Ver más
          </a>
        </div>
      </div>
    </div>
  }

  <button type="button" (click)="prevSlide()" class="carousel-arrow left" aria-label="Anterior">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-6 w-6">
      <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <button type="button" (click)="nextSlide()" class="carousel-arrow right" aria-label="Siguiente">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-6 w-6">
      <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <div class="carousel-dots absolute bottom-6 left-1/2 z-20 flex -translate-x-1/2 gap-2">
    @for (item of carouselItems; track item.id; let i = $index) {
      <button
      type="button" class="h-3 w-3 rounded-full transition"
      [class.bg-white]="currentSlide === i"
      [class.bg-white/40]="currentSlide !== i"
      (click)="goToSlide(i)"></button>
    }
  </div>
</div>
