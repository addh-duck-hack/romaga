<div class="bg-white rounded-2xl shadow-xl px-8 py-12 sm:px-12 lg:px-8">
    <div class="mb-12 space-y-4">
        <h3 class="text-2xl font-semibold text-purple-900">{{ card().title }}</h3>
        <p class="mb-6">{{ card().description }}</p>
        <a href="{{ card().route }}" class="block font-medium text-purple-600">Ver más</a>
    </div>
    <img [src]="card().image" class="w-2/3 ml-auto -mb-12" alt="illustration" loading="lazy" width="900" height="600">
</div>
