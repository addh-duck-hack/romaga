<div class="bg-white rounded-2xl shadow-xl px-8 py-12 sm:px-12 lg:px-8">
    <div class="mb-12 space-y-4 card-content">
        <h3 class="text-2xl font-semibold">{{ card().title }}</h3>
        <p class="mb-6 text-justify">{{ card().description }}</p>
        <a href="{{ card().route }}" class="block font-medium">Ver más</a>
    </div>
    <img [src]="card().image" class="w-2/3 ml-auto -mb-12 rounded-lg" alt="illustration" loading="lazy" width="900" height="600">
</div>
