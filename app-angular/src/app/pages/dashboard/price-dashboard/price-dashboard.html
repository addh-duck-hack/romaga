<main>
  <div class="pt-6 px-4">
    <div class="w-full grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-4">
      <!-- Contenedor del formulario para las cotizaciones -->
      <div class="bg-white shadow rounded-lg p-4 sm:p-6 xl:p-8 ">
        <div class="flex flex-wrap items-center justify-between mb-4">
          <div class="w-full">
              <div class="flex text-[#575757]">
                <i class="fa-solid fa-satellite mr-4 py-1"></i><h3 class="text-xl font-bold mb-2">Nueva cotización</h3>
              </div>
              <span class="text-base font-normal text-gray-500">Aqui podras seleccionar el origen y destino asi como los puntos intermedios para realizar la cotización</span>
          </div>
          <!-- div contenedor del formulario -->
          <div class="flex mt-8 w-full">
            <form class="bg-white w-full price-form">
              <div class="flex items-center price-content-input py-2 px-3 price-rounded mb-4">
                <i class="fa-solid fa-map-pin price-form-icon"></i>
                <input
                  class="pl-2 outline-none border-none w-full"
                  type="text"
                  name="campo1"
                  [value]=""
                  (input)="campo1.set(campo1txt.value)"
                  placeholder="Origen"
                  #campo1txt
                />
                <button
                  type="button"
                  class="px-4 py-1 price-no-margin hover:bg-[#C93636] bg-[#8C2626] cursor-pointer price-rounded text-white">
                  Buscar
                </button>
              </div>

                <div class="bg-white rounded-lg border border-gray-200 w-48 text-gray-900 text-sm font-medium">
                    <a href="#" aria-current="true" class="block px-4 py-2 border-b border-gray-200 w-full rounded-t-lg bg-blue-700 text-white cursor-pointer">
                        Profile
                    </a>
                    <a href="#" class="block px-4 py-2 border-b border-gray-200 w-full hover:bg-gray-100 hover:text-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-700 focus:text-blue-700 cursor-pointer">
                        Settings
                    </a>
                    <a href="#" class="block px-4 py-2 border-b border-gray-200 w-full hover:bg-gray-100 hover:text-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-700 focus:text-blue-700 cursor-pointer">
                        Messages
                    </a>
                    <a href="#" class="block px-4 py-2 border-b border-gray-200 w-full rounded-b-lg hover:bg-gray-100 hover:text-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-700 focus:text-blue-700 cursor-pointer">
                        Download
                    </a>
                </div>
              </div> -->
              <div class="flex items-center price-content-input py-2 px-3 price-rounded mb-4">
                <i class="fa-solid fa-map-pin price-form-icon"></i>
                <input
                  class="pl-2 outline-none border-none w-full"
                  type="text"
                  name="campo1"
                  [value]=""
                  (input)="campo1.set(campo1txt.value)"
                  placeholder="Destino"
                  #campo1txt
                />
                <button
                  type="button"
                  class="px-4 py-1 price-no-margin hover:bg-[#C93636] bg-[#8C2626] cursor-pointer price-rounded text-white">
                  Buscar
                </button>
              </div>
              <button
                type="button"
                class="block w-3/5 hover:bg-[#C93636] bg-[#8C2626] cursor-pointer mt-4 py-2 price-rounded text-white font-semibold mb-2">
                Cotizar
              </button>
            </form>
          </div>
        </div>
      </div>
      <!-- ------------------------------Separador------------------------------ -->
      <!-- Contenedor para mostrar el mapa -->
      <div class="bg-white shadow rounded-lg p-4 sm:p-6 xl:p-8 2xl:col-span-2">
        <div class="flex items-center justify-between mb-4">
          <div class="flex-shrink-0">
            <div class="flex text-[#575757]">
              <i class="fa-solid fa-map-location mr-4 py-1"></i><h3 class="text-xl font-bold mb-2">Mapa</h3>
            </div>
            <span class="text-base font-normal text-gray-500">Aqui se mostraran los puntos seleccionados</span>
          </div>
        </div>
        <!-- Div contenedor del mapa -->
        <div id="main-chart">
          Aqui va a ir el mapa
        </div>
        <h1>Otro texto</h1>
      </div>
    </div>
  </div>
</main>
